# Daily lesson autopilot.
#
# OFF by default. To enable:
#   Repo → Settings → Secrets and variables → Actions → Variables →
#   add  AUTOPILOT_ENABLED = true
#
# To auto-post to YouTube, also add these repository SECRETS
# (see README → "Linking your YouTube channel"):
#   YT_CLIENT_SECRET_JSON   contents of secrets/client_secret.json
#   YT_TOKEN_JSON           contents of secrets/token.json
# and optionally the variable YT_PRIVACY = public (default: private).

name: Daily Lesson Video

on:
  schedule:
    # Target: 5:00 PM US Eastern daily — when Grade 9-10 students get home
    # and search for homework help. GitHub cron runs in UTC, so production
    # starts ~2h earlier to allow render time:
    #   19:00 UTC = 3:00 PM EDT (school year Mar-Nov) / 2:00 PM EST →
    #   video goes live close to the 4-6 PM ET window.
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      day:
        description: "Lesson day to produce (blank = next scheduled)"
        required: false

jobs:
  produce:
    if: ${{ vars.AUTOPILOT_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write   # to push the updated state/progress.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (Manim + LaTeX + ffmpeg)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev libpango1.0-dev ffmpeg \
            texlive texlive-latex-extra texlive-fonts-recommended \
            texlive-extra-utils dvisvgm dvipng cm-super

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Produce today's lesson (render only — no upload)
        env:
          LESSON_DAY: ${{ github.event.inputs.day }}
        run: python autopilot.py

      - name: Save finished videos as workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lesson-output
          retention-days: 7
          path: |
            output/final_videos/*.mp4
            output/final_videos/*.srt
            output/final_videos/*.vtt
            output/thumbnails/*.jpg
            output/logs/*.json

      - name: Commit progress state
        run: |
          git config user.name "autopilot"
          git config user.email "actions@users.noreply.github.com"
          git add state/progress.json
          git diff --cached --quiet || git commit -m "autopilot: advance lesson progress"
          git push
