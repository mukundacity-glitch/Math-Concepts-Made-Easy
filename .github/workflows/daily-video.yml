# Full autopilot — renders AND uploads to YouTube every day automatically.
#
# SETUP (one-time, in GitHub repo settings):
#   Settings → Secrets and variables → Actions
#
#   Secrets required (contents of your local files):
#     YT_CLIENT_SECRET_JSON   paste the full contents of secrets/client_secret.json
#     YT_TOKEN_JSON           paste the full contents of secrets/token.json
#
#   Variables required to enable the schedule:
#     AUTOPILOT_ENABLED = true          (prevents accidental runs on forks)
#
#   Optional variable:
#     YT_PRIVACY = public               (default: public — change to private/unlisted to hold)

name: Daily Lesson Video

on:
  schedule:
    # Target: 5:00 PM US Eastern daily — when Grade 9-10 students get home
    # and search for homework help. GitHub cron runs in UTC, so production
    # starts ~2h earlier to allow render + upload time:
    #   19:00 UTC = 3:00 PM EDT (school year Mar-Nov) / 2:00 PM EST
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      day:
        description: "Lesson day to produce (blank = next scheduled)"
        required: false
      privacy:
        description: "YouTube privacy"
        required: false
        default: "public"
        type: choice
        options:
          - public
          - unlisted
          - private

jobs:
  produce-and-publish:
    if: ${{ vars.AUTOPILOT_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write   # to push the updated state/progress.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (Manim + LaTeX + ffmpeg)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev libpango1.0-dev ffmpeg \
            texlive texlive-latex-extra texlive-fonts-recommended \
            texlive-extra-utils dvisvgm dvipng cm-super

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Render and upload today's lesson to YouTube
        env:
          LESSON_DAY: ${{ github.event.inputs.day }}
          YT_CLIENT_SECRET_JSON: ${{ secrets.YT_CLIENT_SECRET_JSON }}
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
          YT_PRIVACY: ${{ github.event.inputs.privacy || vars.YT_PRIVACY || 'public' }}
        run: python autopilot.py --upload

      - name: Save finished videos as workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lesson-output
          retention-days: 7
          path: |
            output/final_videos/*.mp4
            output/final_videos/*.srt
            output/final_videos/*.vtt
            output/thumbnails/*.jpg
            output/logs/*.json

      - name: Commit progress state
        run: |
          git config user.name "autopilot"
          git config user.email "actions@users.noreply.github.com"
          git add state/progress.json
          git diff --cached --quiet || git commit -m "autopilot: advance lesson progress"
          git push
