# Full autopilot — renders AND uploads to YouTube every day, no manual step.
#
# ONE-TIME SETUP (GitHub repo → Settings → Secrets and variables → Actions):
#
#   SECRETS (paste full file contents):
#     YT_CLIENT_SECRET_JSON   →  contents of secrets/client_secret.json
#     YT_TOKEN_JSON           →  contents of secrets/token.json
#
#   No variables needed — schedule runs automatically on its own days.
#   To temporarily pause posting, set variable  AUTOPILOT_PAUSED = true
#
#   Render quality defaults to 1080p60. 4K/30fps can be requested either
#   via manual "Run workflow" below, or by setting the repo variable
#   MCME_RENDER_QUALITY = 4k30 (picked up by the scheduled run too — set
#   this deliberately, not as a stale leftover). Either way, cell4's
#   pre-flight budget check falls back to 1080p60 on its own if a 4K
#   render looks likely to exceed the job's time budget, so the daily
#   upload never fails outright because of it.
#
#   POSTING SCHEDULE: Thu/Fri 1PM Eastern, Sun 10AM Eastern (student
#   after-school / leisure-browsing windows). GitHub Actions cron has
#   no timezone support, so this is approximated with two seasonal
#   pairs of UTC cron rules (EDT Mar-Nov, EST Dec-Feb) — accurate
#   except for a ~1-week margin around the actual DST transition dates,
#   which shift by a few days each year.

name: Daily Lesson Video

on:
  schedule:
    # EDT months (UTC-4, roughly mid-Mar to early-Nov): Thu/Fri 1PM EDT,
    # Sun 10AM EDT.
    - cron: "0 17 * 3-11 4,5"
    - cron: "0 14 * 3-11 0"
    # EST months (UTC-5, roughly early-Nov to mid-Mar): Thu/Fri 1PM EST,
    # Sun 10AM EST.
    - cron: "0 18 * 1,2,12 4,5"
    - cron: "0 15 * 1,2,12 0"
  workflow_dispatch:
    inputs:
      day:
        description: "Lesson day number (leave blank = next in sequence)"
        required: false
      privacy:
        description: "YouTube privacy"
        required: false
        default: "public"
        type: choice
        options:
          - public
          - unlisted
          - private
      render_quality:
        description: "Render quality (4k30 is manual-only, never the scheduled default)"
        required: false
        default: "h"
        type: choice
        options:
          - h
          - 4k30

jobs:
  produce-and-publish:
    # Always run — paused only when owner explicitly sets AUTOPILOT_PAUSED=true
    if: ${{ vars.AUTOPILOT_PAUSED != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (Manim + LaTeX + ffmpeg)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev libpango1.0-dev ffmpeg fonts-dejavu-core \
            texlive texlive-latex-extra texlive-fonts-recommended \
            texlive-extra-utils dvisvgm dvipng cm-super

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Render and upload lesson to YouTube
        env:
          YT_CLIENT_SECRET_JSON: ${{ secrets.YT_CLIENT_SECRET_JSON }}
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
          YT_PRIVACY: ${{ github.event.inputs.privacy || vars.YT_PRIVACY || 'public' }}
          MCME_RENDER_QUALITY: ${{ github.event.inputs.render_quality || vars.MCME_RENDER_QUALITY || 'h' }}
        run: |
          DAY_ARG=""
          [ -n "${{ github.event.inputs.day }}" ] && DAY_ARG="--day ${{ github.event.inputs.day }}"
          python autopilot.py --upload $DAY_ARG

      - name: Save video as downloadable artifact (7-day backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lesson-output-day${{ github.event.inputs.day || 'auto' }}
          retention-days: 7
          path: |
            output/final_videos/*.mp4
            output/final_videos/*.srt
            output/final_videos/*.vtt
            output/thumbnails/*.jpg

      - name: Commit updated progress state
        if: always()
        run: |
          git config user.name "autopilot"
          git config user.email "actions@users.noreply.github.com"
          git add state/progress.json
          # render_timings.json only exists after a 4K render has run at
          # least once — add it conditionally so a missing pathspec never
          # fails this step on ordinary 1080p60 runs.
          [ -f state/render_timings.json ] && git add state/render_timings.json
          git diff --cached --quiet || git commit -m "autopilot: advance lesson day"
          git push || true
